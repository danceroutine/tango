services:
    postgres:
        image: postgres:16
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: tango_test
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d tango_test']
            interval: 10s
            timeout: 5s
            retries: 5
