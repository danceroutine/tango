name: Release

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            release_type:
                description: 'Release channel'
                required: true
                default: alpha
                type: choice
                options:
                    - alpha
                    - stable
                    - stable-recovery
            branch:
                description: 'Branch to release from (workflow_dispatch only)'
                required: false
                default: main
                type: string

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
    cancel-in-progress: false

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        environment: npm
        outputs:
            stable_release_mode: ${{ steps.stable-release.outputs.mode }}
            publish_state_mode: ${{ steps.publish-state.outputs.mode }}
            docs_checkout_ref: ${{ steps.docs-checkout-ref.outputs.ref }}
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: tango_test
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d tango_test"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            TANGO_DB_ADAPTER: postgres
            TANGO_DATABASE_URL: postgres://postgres:postgres@localhost:5432/tango_test
        steps:
            - name: Checkout (push)
              if: github.event_name == 'push'
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Checkout (workflow_dispatch)
              if: github.event_name == 'workflow_dispatch'
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.branch }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24.11.1'
                  registry-url: 'https://registry.npmjs.org'

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Log release toolchain
              run: |
                  node --version
                  npm --version
                  pnpm --version

            - name: Get pnpm store directory
              id: pnpm-cache
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Wait for postgres
              run: |
                  until nc -z localhost 5432; do
                    sleep 1
                  done

            - name: Run integration tests
              run: |
                  pnpm test:integration:sqlite
                  pnpm test:integration:postgres

            - name: Validate stable branch selection
              if: github.event_name == 'workflow_dispatch' && (inputs.release_type == 'stable' || inputs.release_type == 'stable-recovery') && inputs.branch != 'main'
              run: |
                  echo "Stable releases and stable recovery must run from main." >&2
                  exit 1

            - name: Validate committed stable release state
              if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')
              run: pnpm exec tsx scripts/release/resolve-publish-state.ts --mode=stable-input

            - name: Version packages (stable)
              if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')
              run: pnpm changeset:version

            - name: Detect stable release changes
              if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')
              id: stable-release
              shell: bash
              run: |
                  if git diff --quiet --exit-code; then
                    echo "mode=noop" >> "$GITHUB_OUTPUT"
                  else
                    echo "mode=release" >> "$GITHUB_OUTPUT"
                  fi

            - name: Resolve publish state
              if: ((github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')) && steps.stable-release.outputs.mode == 'release') || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable-recovery')
              id: publish-state
              run: pnpm exec tsx scripts/release/resolve-publish-state.ts

            - name: Generate release app token (stable)
              if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')) && steps.stable-release.outputs.mode == 'release' && steps.publish-state.outputs.mode == 'publish'
              id: release-app-token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ vars.RELEASE_APP_ID }}
                  private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}

            - name: Commit version changes to main (stable)
              if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')) && steps.stable-release.outputs.mode == 'release' && steps.publish-state.outputs.mode == 'publish'
              shell: bash
              env:
                  APP_TOKEN: ${{ steps.release-app-token.outputs.token }}
                  NPM_CONFIG_PROVENANCE: true
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "chore: version packages [skip ci]"
                  git config --local --unset-all http.https://github.com/.extraheader || true
                  git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git push origin HEAD:main

            - name: Publish packages (stable)
              if: (((github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')) && steps.stable-release.outputs.mode == 'release') || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable-recovery')) && steps.publish-state.outputs.mode == 'publish'
              run: pnpm changeset:publish
              env:
                  NPM_CONFIG_PROVENANCE: true

            - name: Capture docs checkout ref
              if: (((github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')) && steps.stable-release.outputs.mode == 'release') || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable-recovery')) && steps.publish-state.outputs.mode == 'publish'
              id: docs-checkout-ref
              run: echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

            - name: Get short SHA
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              id: sha
              run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            - name: Version packages as alpha
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              run: pnpm changeset version --snapshot alpha-${{ steps.sha.outputs.SHORT_SHA }}

            - name: Build packages
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              run: pnpm build

            - name: Publish alpha packages
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              run: pnpm changeset publish --no-git-tag --snapshot --tag alpha
              env:
                  NPM_CONFIG_PROVENANCE: true

    docs:
        name: Deploy docs (stable publish)
        needs: release
        if: |
            (
              (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable'))
              && needs.release.outputs.stable_release_mode == 'release'
              && needs.release.outputs.publish_state_mode == 'publish'
            )
            || (
              github.event_name == 'workflow_dispatch'
              && inputs.release_type == 'stable-recovery'
              && needs.release.outputs.publish_state_mode == 'publish'
            )
        uses: danceroutine/tango/.github/workflows/docs-pages.reusable.yml@main
        with:
            checkout_ref: ${{ needs.release.outputs.docs_checkout_ref }}
