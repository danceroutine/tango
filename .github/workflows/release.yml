name: Release

on:
    push:
        branches:
            - master
    workflow_dispatch:
        inputs:
            release_type:
                description: 'Release channel'
                required: true
                default: alpha
                type: choice
                options:
                    - alpha
                    - stable
            branch:
                description: 'Branch to release from (workflow_dispatch only)'
                required: false
                default: master
                type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        environment: npm
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: tango_test
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d tango_test"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            TANGO_DB_ADAPTER: postgres
            TANGO_DATABASE_URL: postgres://postgres:postgres@localhost:5432/tango_test
        steps:
            - name: Checkout (push)
              if: github.event_name == 'push'
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 0

            - name: Checkout (workflow_dispatch)
              if: github.event_name == 'workflow_dispatch'
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.branch }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  registry-url: 'https://registry.npmjs.org'

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Upgrade npm for OIDC trusted publishing
              run: npm install -g npm@11

            - name: Get pnpm store directory
              id: pnpm-cache
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Wait for postgres
              run: |
                  until nc -z localhost 5432; do
                    sleep 1
                  done

            - name: Run integration tests
              run: |
                  pnpm test:integration:sqlite
                  pnpm test:integration:postgres

            - name: Version packages (stable)
              if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')
              run: pnpm changeset:version

            - name: Detect stable release changes
              if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')
              id: stable-release
              shell: bash
              run: |
                  if git diff --quiet --exit-code; then
                    echo "mode=publish" >> "$GITHUB_OUTPUT"
                  else
                    echo "mode=pr" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create or update release pull request (stable)
              if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')) && steps.stable-release.outputs.mode == 'pr'
              shell: bash
              run: |
                  BRANCH="changeset-release/master"
                  TITLE="chore: version packages"
                  BODY="Generated by the Tango release workflow."
                  HEAD_REF="${GITHUB_REPOSITORY_OWNER}:$BRANCH"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git switch -C "$BRANCH"
                  git add -A
                  git commit -m "$TITLE"
                  git push origin "$BRANCH" --force

                  existing_pr="$(gh pr list --base master --head "$HEAD_REF" --state open --json number --jq '.[0].number // \"\"')"

                  if [ -n "$existing_pr" ]; then
                    gh pr edit "$existing_pr" --title "$TITLE" --body "$BODY"
                  else
                    gh pr create --base master --head "$BRANCH" --title "$TITLE" --body "$BODY"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: true
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish packages (stable)
              if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable')) && steps.stable-release.outputs.mode == 'publish'
              run: pnpm changeset:publish
              env:
                  NPM_CONFIG_PROVENANCE: true

            - name: Get short SHA
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              id: sha
              run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            - name: Version packages as alpha
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              run: pnpm changeset version --snapshot alpha-${{ steps.sha.outputs.SHORT_SHA }}

            - name: Build packages
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              run: pnpm build

            - name: Publish alpha packages
              if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'alpha'
              run: pnpm changeset publish --no-git-tag --snapshot --tag alpha
              env:
                  NPM_CONFIG_PROVENANCE: true
